
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Druhé stanoviště</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
  font-family: Arial, sans-serif;
  color:#fff;
}

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:24px 16px;
  gap:16px;
}

.logo{
  width:min(70vw,320px);
  height:auto;
  filter:drop-shadow(0 0 20px rgba(255,0,0,.9));
}

h2{
  margin:0;
  font-size:28px;
  text-shadow:0 0 10px rgba(255,0,0,.6);
}

.small{
  opacity:.95;
  font-size:16px;
  line-height:1.4;
  max-width: min(92vw, 560px);
}

.photo{
  width:min(92vw,560px);
  height:auto;
  border-radius:14px;
  border:1px solid rgba(255,0,0,.55);
  box-shadow:0 0 22px rgba(255,0,0,.25);
  display:block;
}

.gif{
  width:min(92vw,560px);
  height:auto;
  border-radius:14px;
  border:1px solid rgba(255,0,0,.55);
  box-shadow:0 0 22px rgba(255,0,0,.25);
  display:block;
}

.btn{
  width:min(86vw,340px);
  padding:16px 18px;
  border-radius:14px;
  border:1px solid rgba(255,0,0,.9);
  background:red;
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 0 18px rgba(255,0,0,.25);
}

.btn:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="wrap">

  <img class="logo" src="bezpozadi.png" alt="PRIMASRANDA">

  <h2></h2>

  <div class="small">
    Než zazvoní nám zvonec,<br>
    této únikovce musíme dát pěkný konec,<br>
    přiznejte se, kdo máte první obálku,<br>
    Ať naposledy pozvedneme týmovoun morálku!<br>
    Nebudeme přeci končit pouze vínem,<br>
    tohle začínalo i končí rýmem!
  </div>

  <img class="photo" src="sb2.png" alt="Tunel a most">

 
  </div>




</div>

</body>
</html>
