

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Další krok</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
  font-family: Arial, sans-serif;
  color:#fff;
}

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:24px 16px;
  gap:20px;
}

.logo{
  width:min(70vw,320px);
  height:auto;
  filter:drop-shadow(0 0 20px rgba(255,0,0,.9));
}

.card{
  width:min(92vw,500px);
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,0,0,.5);
  border-radius:14px;
  padding:24px;
  line-height:1.6;
}

h2{
  margin-top:0;
  text-shadow:0 0 10px rgba(255,0,0,.7);
}

button{
  padding:16px 28px;
  border-radius:14px;
  border:1px solid rgba(255,0,0,.9);
  background:red;
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  box-shadow: 0 0 18px rgba(255,0,0,.25);
}

button:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="wrap">

  <img class="logo" src="bezpozadi.png" alt="Logo">

  <div class="card">
    <h2> 🧭</h2>

    <p>
     Teď na sever se vydejte, 200m ujděte,<br>
     až na první zebru narazíte, přes její hřbet přejděte.<br>
      další zebra opět na sever ukáže vám cestu, <br>
      a díky ní víte směr na dalších 80 metrů!<br>
     Hle! dvě zebry blízko sebe,<br>
      vás ovšem zajímá zas směr sever!<br>
      Po schodech se vydáte, <br>
      a uprostřed náměstí se ocitáte!
      
      <br><br>

      
    </p>
  </div>

  <button onclick="location.href='s24.html'">
   Jsme zde
  </button>

</div>

</body>
</html>
